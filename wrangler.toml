name = "vernen-legal-compliance"
main = "src/index.ts"
compatibility_date = "2026-03-15"

# Custom domain route
routes = [
  { pattern = "compliance.vernenlegal.com/*", zone_name = "vernenlegal.com" }
]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "vernen-legal-compliance"
database_id = "e120c52d-fac5-432a-93d1-d737046f19ea"

# KV Namespace for Citizen knowledge stores
[[kv_namespaces]]
binding = "KNOWLEDGE_STORE"
id = "b5185e79eb634dff9fab6ae2027d3801"

# Workers AI — for document vision (OCR/image-to-text)
[ai]
binding = "AI"

# Cron triggers — daily verification anchor at 1 AM UTC
[triggers]
crons = ["0 1 * * *"]

# ── Stripe Secrets ─────────────────────────────────────────────────
# Run these commands to set Stripe secrets:
# npx wrangler secret put STRIPE_SECRET_KEY
# npx wrangler secret put STRIPE_WEBHOOK_SECRET
#
# The platform gracefully handles missing keys — payment endpoints
# return a "being configured" message until secrets are set.
